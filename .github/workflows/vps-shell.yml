name: Run Command On VPS

on:
  workflow_dispatch:
    inputs:
      action:
        description: Preset VPS action inside /home/ubuntu/rust-scanlink
        required: true
        default: status
        type: choice
        options:
          - status
          - start
          - stop
          - tail-log
          - custom
      tail_lines:
        description: Tail lines for status or tail-log
        required: true
        default: "120"
        type: string
      command:
        description: Custom shell command for action=custom
        required: false
        default: ""
        type: string

jobs:
  run-vps-command:
    runs-on: ubuntu-latest
    steps:
      - name: Execute command on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            bash <<'EOF'
            set -euo pipefail
            cd /home/ubuntu/rust-scanlink

            if [ -f ./.env ]; then
              set -a
              . ./.env
              set +a
            fi

            FILTER_DB_PATH="${FILTER_DB_PATH:-data/filter.sqlite3}"
            RUNTIME_PID_DIR="$(dirname "$FILTER_DB_PATH")"
            RUNTIME_PID_FILE="$RUNTIME_PID_DIR/runtime.pid"
            RUNTIME_REPORT_FILE="${RUNTIME_REPORT_FILE:-data/runtime_report.json}"
            TAIL_LINES="${{ inputs.tail_lines }}"
            ACTION="${{ inputs.action }}"

            resolve_log_file() {
              if [ -f "$RUNTIME_PID_FILE" ]; then
                PID="$(cat "$RUNTIME_PID_FILE" 2>/dev/null || true)"
                if [ -n "${PID:-}" ] && kill -0 "$PID" 2>/dev/null; then
                  readlink "/proc/$PID/fd/1" 2>/dev/null || true
                  return
                fi
              fi
              ls -1t scanner*.log 2>/dev/null | head -n 1 || true
            }

            case "$ACTION" in
              status)
                echo "cwd=$(pwd)"
                echo "scanner_mode=${SCANNER_MODE:-auto}"
                echo "execution_enabled=${EXECUTION_ENABLED:-false}"
                echo "runtime_pid_file=$RUNTIME_PID_FILE"
                echo "runtime_report_file=$RUNTIME_REPORT_FILE"
                echo "processed_feed_label=${SCANNER_PRIMARY_FEED_LABEL:-primary_processed}"
                echo "secondary_feed_configured=${SCANNER_SECONDARY_GRPC_URL:+true}"
                echo "deshred_feed_label=${SCANNER_DESHRED_FEED_LABEL:-deshred_pre_exec}"
                echo "deshred_feed_configured=${SCANNER_DESHRED_GRPC_URL:+true}"

                PID=""
                if [ -f "$RUNTIME_PID_FILE" ]; then
                  PID="$(cat "$RUNTIME_PID_FILE" 2>/dev/null || true)"
                fi
                if [ -n "$PID" ] && kill -0 "$PID" 2>/dev/null; then
                  echo "process_status=running"
                  ps -fp "$PID"
                else
                  echo "process_status=stopped"
                fi

                echo "---HOTLISTS---"
                for ENTRY in \
                  "smart_money:${SMART_MONEY_FILE:-data/smart_money.txt}" \
                  "smart_money_funders:${SMART_MONEY_FUNDER_FILE:-data/smart_money_funders.txt}" \
                  "blocked_buyers:${BLOCKED_BUYERS_FILE:-data/blocked_buyers.txt}" \
                  "dynamic_keywords:${DYNAMIC_HOT_KEYWORDS_FILE:-data/dynamic_hot_keywords.txt}"
                do
                  NAME="${ENTRY%%:*}"
                  FILE="${ENTRY#*:}"
                  COUNT="$(grep -cve '^[[:space:]]*$' "$FILE" 2>/dev/null || true)"
                  echo "$NAME file=$FILE count=$COUNT"
                done

                echo "---RUNTIME-REPORT---"
                if [ -f "$RUNTIME_REPORT_FILE" ]; then
                  cat "$RUNTIME_REPORT_FILE"
                else
                  echo "missing $RUNTIME_REPORT_FILE"
                fi

                LOG_FILE="$(resolve_log_file)"
                echo "---LOG-TAIL---"
                if [ -n "${LOG_FILE:-}" ] && [ -f "$LOG_FILE" ]; then
                  echo "log_file=$LOG_FILE"
                  tail -n "$TAIL_LINES" "$LOG_FILE"
                else
                  echo "no scanner log found"
                fi
                ;;

              start)
                PID=""
                if [ -f "$RUNTIME_PID_FILE" ]; then
                  PID="$(cat "$RUNTIME_PID_FILE" 2>/dev/null || true)"
                fi
                if [ -n "$PID" ] && kill -0 "$PID" 2>/dev/null; then
                  echo "already running pid=$PID"
                  ps -fp "$PID"
                  exit 0
                fi

                TS="$(date +%Y%m%d-%H%M%S)"
                LOG_FILE="scanner-$TS.log"
                nohup bash -lc 'cd /home/ubuntu/rust-scanlink && if [ -f ./.env ]; then set -a; . ./.env; set +a; fi; exec ./rust-scanlink-trader' \
                  >> "/home/ubuntu/rust-scanlink/$LOG_FILE" 2>&1 < /dev/null &
                sleep 5

                if [ -f "$RUNTIME_PID_FILE" ]; then
                  PID="$(cat "$RUNTIME_PID_FILE" 2>/dev/null || true)"
                else
                  PID=""
                fi
                if [ -z "$PID" ] || ! kill -0 "$PID" 2>/dev/null; then
                  echo "failed to start"
                  tail -n "$TAIL_LINES" "/home/ubuntu/rust-scanlink/$LOG_FILE" || true
                  exit 1
                fi

                echo "started pid=$PID log=$LOG_FILE"
                ps -fp "$PID"
                tail -n "$TAIL_LINES" "/home/ubuntu/rust-scanlink/$LOG_FILE"
                ;;

              stop)
                PID=""
                if [ -f "$RUNTIME_PID_FILE" ]; then
                  PID="$(cat "$RUNTIME_PID_FILE" 2>/dev/null || true)"
                fi
                if [ -z "$PID" ] || ! kill -0 "$PID" 2>/dev/null; then
                  echo "already stopped"
                  exit 0
                fi

                kill "$PID"
                for _ in 1 2 3 4 5 6; do
                  if ! kill -0 "$PID" 2>/dev/null; then
                    break
                  fi
                  sleep 1
                done
                if kill -0 "$PID" 2>/dev/null; then
                  kill -9 "$PID"
                fi
                echo "stopped pid=$PID"
                ;;

              tail-log)
                LOG_FILE="$(resolve_log_file)"
                if [ -z "${LOG_FILE:-}" ] || [ ! -f "$LOG_FILE" ]; then
                  echo "no scanner log found"
                  exit 1
                fi
                echo "log_file=$LOG_FILE"
                tail -n "$TAIL_LINES" "$LOG_FILE"
                ;;

              custom)
                CUSTOM_COMMAND="${{ inputs.command }}"
                if [ -z "$CUSTOM_COMMAND" ]; then
                  echo "custom action requires command input"
                  exit 1
                fi
                eval "$CUSTOM_COMMAND"
                ;;

              *)
                echo "unsupported action: $ACTION"
                exit 1
                ;;
            esac
            EOF
